name: Restore Test

on:
  schedule:
    # Every Sunday 19:00 UTC = Monday 03:00 Taiwan Standard Time
    - cron: "0 19 * * 0"
  workflow_dispatch:

jobs:
  restore-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: restore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client-18
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-18

      - name: Download latest backup from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          LATEST_KEY=$(
            aws s3 ls "s3://${{ secrets.R2_BUCKET }}/backups/" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
              --region auto \
            | sort | tail -1 | awk '{print $4}'
          )
          if [[ -z "$LATEST_KEY" ]]; then
            echo "::error::No backup files found in R2 — has the nightly backup run yet?"
            exit 1
          fi
          echo "Downloading: $LATEST_KEY"
          aws s3 cp \
            "s3://${{ secrets.R2_BUCKET }}/backups/${LATEST_KEY}" \
            /tmp/restore-test.sql.gz \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}" \
            --region auto
          echo "SIZE=$(du -sh /tmp/restore-test.sql.gz | cut -f1)" >> "$GITHUB_ENV"
          echo "BACKUP_KEY=$LATEST_KEY" >> "$GITHUB_ENV"

      - name: Restore dump into test Postgres
        env:
          PGPASSWORD: testpass
        run: |
          echo "Dump file size: $(du -sh /tmp/restore-test.sql.gz)"
          echo "First 5 lines of dump (uncompressed):"
          gunzip -c /tmp/restore-test.sql.gz | head -5 || true
          echo "--- restoring ---"
          gunzip -c /tmp/restore-test.sql.gz \
            | psql -h localhost -U postgres -d restore_test \
                --set=ON_ERROR_STOP=1
          echo "Restored $BACKUP_KEY ($SIZE) into test Postgres"
          echo "Tables after restore:"
          psql -h localhost -U postgres -d restore_test -c "\dt" 2>&1 || true

      - name: Smoke-check restore
        env:
          RESTORE_TEST_URL: postgresql://postgres:testpass@localhost:5432/restore_test
        run: |
          chmod +x scripts/verify-restore.sh
          ./scripts/verify-restore.sh --check-only

      - name: Annotate success
        if: success()
        run: echo "::notice::Restore test PASSED ✓ ($BACKUP_KEY, $SIZE)"

      - name: Annotate failure
        if: failure()
        run: echo "::error::Restore test FAILED for $BACKUP_KEY — see smoke check output above"

      - name: Report pipeline health
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] || STATUS="failure"
          curl -sf -X POST "${{ secrets.NEXT_PUBLIC_SITE_URL }}/api/pipeline-health" \
            -H "Authorization: Bearer ${{ secrets.PIPELINE_HEALTH_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"restore-test\",\"status\":\"${STATUS}\"}" \
          || echo "Warning: health report POST failed (non-fatal)"
